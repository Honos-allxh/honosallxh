<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honoś</title>
    <style>
        /* Tamamen Karartılmış Arka Plan */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Sitenin Yanlarında Akan Kırmızı Işık Efekti */
        .neon-border-box {
            position: relative;
            width: 100vw;
            max-width: 420px;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .neon-border-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ff0000);
            animation: animateBorder 4s linear infinite;
        }

        @keyframes animateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* İç Kısım Siyah Panel */
        .story-container {
            position: absolute;
            inset: 4px; /* Kenardaki ışığın kalınlığı */
            background-color: #000000;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 2;
        }

        /* En üstteki sol köşe yazısı */
        .header-username {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 20px;
            text-align: left;
            opacity: 0.8;
        }

        /* İçeriklerin toplandığı merkez alan */
        .content-box {
            margin-top: auto;
            margin-bottom: auto;
            text-align: center;
        }

        /* Fotoğrafın Tam Çıkması İçin Özelleştirilmiş Kırmızı Çerçeve */
        .avatar-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            border-radius: 50%;
            box-shadow: 0 0 25px #ff0000;
            border: 3px solid #ff0000;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profil-resmi {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Fotoğrafı kırpmaz, tam görüntüyü sığdırır */
        }

        /* Büyük Kırmızı Neon Başlık */
        .main-title {
            font-size: 46px;
            font-weight: 900;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.9), 0 0 30px rgba(255, 0, 0, 0.6);
        }

        /* İtalyanca Kırmızı Racon Sözü */
        .racon-text {
            font-size: 17px;
            color: #ff3333;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 45px;
            padding: 0 10px;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        /* Sosyal Medya Bilgileri */
        .social-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .social-item {
            font-size: 18px;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .social-item:hover {
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="neon-border-box">
        <div class="story-container">
            <div class="header-username">Honoś</div>

            <div class="content-box">
                <div class="avatar-wrapper">
                    <img class="profil-resmi" src="profil.jpg" alt="Honoś">
                </div>

                <div class="main-title">Honoś</div>
                
                <div class="racon-text">
                    Dio: Sei venuto normalmente, te ne andrai in modo speciale.<br>
                    <span style="font-size: 24px; display: inline-block; margin-top: 10px;">⛧</span>
                </div>
                
                <div class="social-list">
                    <a class="social-item" href="https://instagram.com/xbalkanll" target="_blank">Instagram: @xbalkanll</a>
                    <a class="social-item" href="https://tiktok.com/@xhonosll" target="_blank">TikTok: @xhonosll</a>
                </div>
            </div>
        </div>
    </div>

</body>
  </html>
